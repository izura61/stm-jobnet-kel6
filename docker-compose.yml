services:
  
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kel6-sija-jobnet-app
    restart: unless-stopped
    ports:
      - "6020:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/stmjob
      - SESSION_SECRET=stm-job-secret
      - JWT_SECRET=Comneta@50
    depends_on:
      - mongodb
    networks:
      - kel6-network

  mongodb:
    image: mongo:4.4
    container_name: kel6-mongodb
    restart: unless-stopped
    ports:
      - "27066:27017" 
    environment:
      MONGO_INITDB_DATABASE: stmjob 
    volumes:
      - kel6-mongo-data:/data/db
    networks:
      - kel6-network

networks:
  kel6-network:
    driver: bridge

volumes:
  kel6-mongo-data: