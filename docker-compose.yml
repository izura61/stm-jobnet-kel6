services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kel6-sija-jobnet-app
    restart: unless-stopped
    ports:
      - "6020:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/stm_job
      - SESSION_SECRET=stm-job-secret
      - JWT_SECRET=Comneta@50
    depends_on:
      - mongodb
    networks:
      - kel6-network

  mongodb:
    image: mongo:4.4
    container_name: kel6-mongodb
    restart: unless-stopped
    ports:
      - "27066:27017"
    environment:
      MONGO_INITDB_DATABASE: stmjob
    volumes:
      - kel6-mongo-data:/data/db
    networks:
      - kel6-network
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: kel6-cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiY2VmMmU0MzI0NmFjODdiMjQ4ZmQ4YTA3ZjYxOTAyNjciLCJ0IjoiOTc0NGQ5MTktMWFmOS00ZDlhLTlmZmItODNjNjhlMDhlMmMzIiwicyI6IlpHUXdZelUxTWpFdE5qRTFZUzAwWkRZMExXSXdNR1F0Wkdaa1kyWmlOREEwT0RFNSJ9
    networks:
      - kel6-network

networks:
  kel6-network:
    driver: bridge

volumes:
  kel6-mongo-data: